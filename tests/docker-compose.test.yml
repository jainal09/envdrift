# Integration test infrastructure for envdrift
# Usage: docker-compose -f tests/docker-compose.test.yml up -d
#
# Services:
#   - LocalStack: AWS Secrets Manager emulator (port 4566)
#   - Vault: HashiCorp Vault dev server (port 8200)
#   - Lowkey Vault: Azure Key Vault emulator (port 8443)

services:
  localstack:
    image: localstack/localstack:4.0  # Pin to v4.x for stability
    ports:
      - "4566:4566"
    environment:
      - SERVICES=secretsmanager
      - DEBUG=0
      - EAGER_SERVICE_LOADING=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  vault:
    image: hashicorp/vault:1.21  # Pin to v1.21.x for stability
    # Match integration-tests.yml (`--user root`) so the setcap/IPC_LOCK
    # behavior is identical between the local compose stack and CI.
    user: root
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=test-root-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - VAULT_ADDR=http://0.0.0.0:8200
      # Newer hashicorp/vault image builds ship without `setcap`; skip it and
      # disable mlock so the dev container starts (matches integration-tests.yml).
      - SKIP_SETCAP=true
      - VAULT_DISABLE_MLOCK=true
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  lowkey-vault:
    # Keep in sync with .github/workflows/integration-tests.yml. 7.3.0+ is
    # required: older images reject the api-version (2025-07-01) sent by the
    # azure-keyvault-secrets SDK with HTTP 400.
    image: nagyesta/lowkey-vault:7.3.0
    ports:
      - "8443:8443"
      # HTTP port serving the built-in managed-identity token stub
      # (GET /metadata/identity/oauth2/token). DefaultAzureCredential in the
      # envdrift CLI gets its dummy token here via
      # AZURE_POD_IDENTITY_AUTHORITY_HOST (see tests/integration/conftest.py).
      - "8080:8080"
    environment:
      - LOWKEY_VAULT_NAMES=envdrift-test-vault
    healthcheck:
      # The 7.3.x image is BusyBox-based and ships wget but NOT curl; a curl
      # healthcheck can never pass, so `docker compose up --wait`
      # (make test-integration-up) would fail with the container "unhealthy".
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "--no-check-certificate",
          "https://localhost:8443/ping",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
