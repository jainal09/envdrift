name: Release Agent

on:
  # The only release path: agent-v* tags pushed by release-please's PAT (or
  # manually). release-please.yml must NOT also call this workflow — that ran
  # every release twice (#495).
  push:
    tags:
      - 'agent-v*'
  # Reusable-workflow interface kept for ad-hoc reuse; unused by release-please.
  workflow_call:
    inputs:
      tag_name:
        description: 'Tag name from release-please'
        required: true
        type: string

permissions:
  contents: write

# One release pipeline per tag (#495): the release-please PAT tag push is the
# only trigger; this per-tag group is a backstop so a re-run or duplicate
# trigger queues instead of racing binary + checksums.txt uploads for the same
# tag (a checksums.txt from build A paired with a binary from build B makes
# the fail-closed installers abort). Queue (don't cancel) so an in-flight
# release isn't killed mid-upload. Fixed prefix, not `github.workflow`: a
# called workflow sees the *caller's* name there, which would put a
# workflow_call run for the same tag in a different group than a tag push.
concurrency:
  group: release-agent-${{ inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: envdrift-agent

jobs:
  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: envdrift-agent-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: envdrift-agent-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: envdrift-agent-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: envdrift-agent-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: envdrift-agent-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: envdrift-agent/go.sum

      - name: Get version from tag
        id: version
        shell: bash
        env:
          TAG_INPUT: ${{ inputs.tag_name }}
        run: |
          # Handle both tag push and workflow_call
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#agent-v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -ldflags "-s -w -X github.com/jainal09/envdrift-agent/internal/cmd.Version=${{ steps.version.outputs.VERSION }}" \
            -o dist/${{ matrix.artifact }} ./cmd/envdrift-agent

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: envdrift-agent/dist/${{ matrix.artifact }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Prepare release assets
        working-directory: .
        run: |
          mkdir -p release
          # Move all binaries to release folder
          find dist -type f -exec mv {} release/ \;
          ls -la release/

      - name: Generate checksums
        working-directory: .
        run: |
          # install.sh / install.ps1 verify the agent binary against this file;
          # without it the installers' (now fail-closed) checksum step aborts.
          # `sha256sum`'s "<hash>  <filename>" format is exactly what they parse.
          cd release
          # rm first so a retry's stale checksums.txt isn't hashed into itself
          # (the glob expands after the rm, so it only covers the binaries).
          rm -f checksums.txt
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Get version from tag
        id: version
        env:
          TAG_INPUT: ${{ inputs.tag_name }}
        run: |
          # Handle both tag push and workflow_call
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#agent-v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Agent v${{ steps.version.outputs.VERSION }}
          body: |
            ## EnvDrift Agent v${{ steps.version.outputs.VERSION }}

            ### Installation

            The easiest way to install the agent is:
            ```bash
            envdrift install agent
            ```

            ### Manual Installation

            Download the appropriate binary for your platform:
            - **macOS (Apple Silicon)**: `envdrift-agent-darwin-arm64`
            - **macOS (Intel)**: `envdrift-agent-darwin-amd64`
            - **Linux (x64)**: `envdrift-agent-linux-amd64`
            - **Linux (ARM64)**: `envdrift-agent-linux-arm64`
            - **Windows (x64)**: `envdrift-agent-windows-amd64.exe`

            After downloading, make the binary executable (Linux/macOS):
            ```bash
            chmod +x envdrift-agent-*
            sudo mv envdrift-agent-* /usr/local/bin/envdrift-agent
            ```

            ### Usage

            ```bash
            # Install auto-start
            envdrift-agent install

            # Start the agent
            envdrift-agent start

            # Check status
            envdrift-agent status
            ```
          files: |
            release/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
