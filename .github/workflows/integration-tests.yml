# Integration Tests CI Workflow
#
# Runs integration tests with Docker service containers
# for LocalStack (AWS) and HashiCorp Vault.
#
# Triggered on:
# - Pull requests to main
# - Pushes to main
# - Manual dispatch

name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Common environment for all jobs
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  integration-tests:
    name: Integration Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    # Service containers for integration tests
    services:
      localstack:
        image: localstack/localstack:4.14
        ports:
          - 4566:4566
        env:
          SERVICES: secretsmanager
          DEBUG: "0"
          EAGER_SERVICE_LOADING: "1"
        options: >-
          --health-cmd="curl -f http://localhost:4566/_localstack/health"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
          --health-start-period=30s

      vault:
        # Keep in sync with tests/docker-compose.test.yml (hashicorp/vault:1.21).
        image: hashicorp/vault:1.21
        ports:
          - 8200:8200
        env:
          VAULT_DEV_ROOT_TOKEN_ID: test-root-token
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
          VAULT_ADDR: http://0.0.0.0:8200
          # The hashicorp/vault entrypoint calls `setcap` to grant mlock; recent
          # image builds ship without the setcap binary, so the container dies with
          # "setcap: not found". Dev mode doesn't need mlock — skip setcap and
          # disable mlock so the service container starts reliably.
          SKIP_SETCAP: "true"
          VAULT_DISABLE_MLOCK: "true"
        options: >-
          --user root
          --cap-add=IPC_LOCK
          --health-cmd="vault status || exit 0"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=5s

      lowkey-vault:
        # Keep in sync with tests/docker-compose.test.yml. 7.3.0+ is required:
        # older images reject the api-version (2025-07-01) sent by the
        # azure-keyvault-secrets SDK with HTTP 400.
        image: nagyesta/lowkey-vault:7.3.0
        ports:
          - 8443:8443
          # HTTP port serving the built-in managed-identity token stub
          # (GET /metadata/identity/oauth2/token). DefaultAzureCredential in
          # the envdrift CLI gets its dummy token here via
          # AZURE_POD_IDENTITY_AUTHORITY_HOST (see tests/integration/conftest.py).
          - 8080:8080
        env:
          LOWKEY_VAULT_NAMES: envdrift-test-vault
        options: >-
          --health-cmd="curl -f -k https://localhost:8443/ping || exit 0"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=5s

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync --all-extras --locked

      - name: Install dotenvx
        run: |
          mkdir -p "$HOME/.local/bin"
          # Version is the single source of truth in constants.json (kept current by Renovate).
          # Fail fast with a clear message if the file/key is missing or malformed.
          DOTENVX_VERSION=$(python -c "import json,sys; sys.stdout.write(json.load(open('src/envdrift/constants.json'))['dotenvx_version'])") \
            || { echo 'ERROR: could not read dotenvx_version from src/envdrift/constants.json' >&2; exit 1; }
          test -n "$DOTENVX_VERSION" || { echo 'ERROR: dotenvx_version resolved empty' >&2; exit 1; }
          curl -sfS "https://dotenvx.sh?directory=$HOME/.local/bin" | sh -s -- --version="$DOTENVX_VERSION"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install sops
        run: |
          mkdir -p "$HOME/.local/bin"
          # Version + download URL come from constants.json (kept current by Renovate's sops_version manager).
          # Use $(...) (POSIX-portable, not bash-only process substitution) and fail
          # fast with a clear message if the file/keys are missing or malformed.
          SOPS_URL=$(python -c "import json,sys; c=json.load(open('src/envdrift/constants.json')); sys.stdout.write(c['sops_download_urls']['linux_amd64'].format(version=c['sops_version']))") \
            || { echo 'ERROR: could not read sops config from src/envdrift/constants.json' >&2; exit 1; }
          test -n "$SOPS_URL" || { echo 'ERROR: SOPS_URL resolved empty' >&2; exit 1; }
          curl -sfL "$SOPS_URL" -o "$HOME/.local/bin/sops"
          chmod +x "$HOME/.local/bin/sops"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          "$HOME/.local/bin/sops" --version

      - name: Install secret scanners (talisman, trivy, infisical)
        run: |
          mkdir -p "$HOME/.local/bin"
          # Versions + download URLs come from constants.json (Renovate-maintained),
          # so the real scanner e2e tests (tests/integration/test_scanner_external_binaries.py)
          # actually run in CI instead of skipping.
          get_url() { python -c "import json,sys; c=json.load(open('src/envdrift/constants.json')); sys.stdout.write(c['${1}_download_urls']['linux_amd64'].format(version=c['${1}_version']))"; }
          TALISMAN_URL=$(get_url talisman) || { echo 'ERROR: talisman url from constants.json' >&2; exit 1; }
          TRIVY_URL=$(get_url trivy) || { echo 'ERROR: trivy url from constants.json' >&2; exit 1; }
          INFISICAL_URL=$(get_url infisical) || { echo 'ERROR: infisical url from constants.json' >&2; exit 1; }
          # talisman: single static binary; trivy/infisical: tarballs with the binary at the root.
          curl -sfL "$TALISMAN_URL" -o "$HOME/.local/bin/talisman"
          curl -sfL "$TRIVY_URL" | tar -xzf - -C "$HOME/.local/bin" trivy
          curl -sfL "$INFISICAL_URL" | tar -xzf - -C "$HOME/.local/bin" infisical
          chmod +x "$HOME/.local/bin/talisman" "$HOME/.local/bin/trivy" "$HOME/.local/bin/infisical"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          "$HOME/.local/bin/trivy" --version
          "$HOME/.local/bin/infisical" --version || true
          "$HOME/.local/bin/talisman" --version || true

      - name: Verify services are accessible
        run: |
          # Wait for services to fully start after health checks pass
          echo "Waiting for services to be fully ready..."
          sleep 10
          
          echo "Checking LocalStack..."
          LOCALSTACK_READY=false
          for i in {1..30}; do
            if curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1; then
              echo "LocalStack is ready!"
              LOCALSTACK_READY=true
              break
            fi
            echo "Waiting for LocalStack... ($i/30)"
            sleep 2
          done
          if [ "$LOCALSTACK_READY" != "true" ]; then
            echo "ERROR: LocalStack failed to become ready within timeout"
            exit 1
          fi
          
          echo "Checking Vault..."
          VAULT_READY=false
          for i in {1..30}; do
            if curl -sf http://localhost:8200/v1/sys/health > /dev/null 2>&1; then
              echo "Vault is ready!"
              VAULT_READY=true
              break
            fi
            echo "Waiting for Vault... ($i/30)"
            sleep 2
          done
          if [ "$VAULT_READY" != "true" ]; then
            echo "ERROR: Vault failed to become ready within timeout"
            exit 1
          fi
          
          echo "Checking Lowkey Vault..."
          LOWKEY_VAULT_READY=false
          for i in {1..30}; do
            if curl -sfk https://localhost:8443/ping > /dev/null 2>&1; then
              echo "Lowkey Vault is ready!"
              LOWKEY_VAULT_READY=true
              break
            fi
            echo "Waiting for Lowkey Vault... ($i/30)"
            sleep 2
          done
          if [ "$LOWKEY_VAULT_READY" != "true" ]; then
            echo "ERROR: Lowkey Vault failed to become ready within timeout"
            exit 1
          fi

          echo "Checking Lowkey Vault token endpoint..."
          LOWKEY_TOKEN_READY=false
          for i in {1..30}; do
            if curl -sf "http://localhost:8080/metadata/identity/oauth2/token?resource=https%3A%2F%2Fvault.azure.net&api-version=2018-02-01" > /dev/null 2>&1; then
              echo "Lowkey Vault token endpoint is ready!"
              LOWKEY_TOKEN_READY=true
              break
            fi
            echo "Waiting for Lowkey Vault token endpoint... ($i/30)"
            sleep 2
          done
          if [ "$LOWKEY_TOKEN_READY" != "true" ]; then
            echo "ERROR: Lowkey Vault token endpoint failed to become ready within timeout"
            exit 1
          fi

          echo "All services ready!"

      - name: Run integration tests
        env:
          # AWS (LocalStack) configuration
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          AWS_MAX_ATTEMPTS: "3"
          # HashiCorp Vault configuration
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: test-root-token
          # Azure (Lowkey Vault) configuration. TLS trust, the managed-identity
          # token stub and challenge-resource settings are wired per-fixture in
          # tests/integration/conftest.py (azure_test_env): the empty-CA-bundle
          # trick previously set here is ignored by the Azure SDK (#484).
          AZURE_KEYVAULT_URL: https://localhost:8443
        run: |
          uv run pytest tests/integration/ \
            -v \
            --tb=short \
            --timeout=300 \
            -x \
            --cov=src/envdrift \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term-missing

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-integration-py${{ matrix.python-version }}
          path: coverage-integration.xml
          retention-days: 7

  # Job to collect and report coverage
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: integration-tests
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-integration-*
          path: coverage-reports
          merge-multiple: true

      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-reports/coverage-integration*.xml
          flags: integration
          fail_ci_if_error: false
          verbose: true

  # Optional: Run tests with real cloud credentials (manual trigger only)
  cloud-integration-tests:
    name: Cloud Provider Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    env:
      # Map secrets to env vars at job level for step conditional access
      ENVDRIFT_TEST_GCP: ${{ secrets.ENVDRIFT_TEST_GCP }}
      ENVDRIFT_TEST_AZURE: ${{ secrets.ENVDRIFT_TEST_AZURE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync --all-extras --locked

      - name: Run GCP tests (if configured)
        if: env.ENVDRIFT_TEST_GCP == '1'
        env:
          GCP_KEY_CONTENT: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          # Guarantee the plaintext SA key is shredded even if pytest (or the
          # project-id parse) fails — `bash -e` would otherwise skip a trailing
          # `rm` on non-zero exit, leaking the key onto the runner FS.
          cleanup() { rm -f gcp_key.json; }
          trap cleanup EXIT
          printf '%s' "$GCP_KEY_CONTENT" > gcp_key.json
          export GOOGLE_APPLICATION_CREDENTIALS="$(pwd)/gcp_key.json"
          # The real-backend GCP tests also gate on GOOGLE_CLOUD_PROJECT; derive it
          # from the service-account key so the round-trip suite actually runs here.
          export GOOGLE_CLOUD_PROJECT="$(python -c "import json; print(json.load(open('gcp_key.json'))['project_id'])")"
          uv run pytest tests/integration/ -v -m gcp --timeout=120

      - name: Run Azure tests (if configured)
        if: env.ENVDRIFT_TEST_AZURE == '1'
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_KEYVAULT_URL: ${{ secrets.AZURE_KEYVAULT_URL }}
        run: |
          uv run pytest tests/integration/ -v -m azure --timeout=120
