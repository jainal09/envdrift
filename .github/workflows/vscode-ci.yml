name: VS Code Extension CI

on:
  push:
    branches: [main]
    paths:
      - 'envdrift-vscode/**'
      - '.github/workflows/vscode-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'envdrift-vscode/**'
      - '.github/workflows/vscode-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: envdrift-vscode

jobs:
  lint:
    # Named "VS Code Lint" (not "Lint") so it does not collide with the required
    # repo-wide "Lint" status check from ci.yml on PRs that touch envdrift-vscode/**.
    name: VS Code Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: envdrift-vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: envdrift-vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      # The shipped artifact is the esbuild bundle (package.json `main`), not the
      # tsc output — build it here so a broken bundle fails the Build job.
      - name: Bundle extension
        run: npm run bundle

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [lint, build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: envdrift-vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Run unit tests
        run: npm run test:unit

      - name: Run extension tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Run extension tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: npm test

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: envdrift-vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      # `vsce package` runs the `vscode:prepublish` script, which bundles
      # src/ -> dist/extension.js with esbuild (cross-spawn and all other
      # runtime deps inlined). `--no-dependencies` is correct *because* we
      # bundle: no node_modules ship in the vsix, keeping it small (#584).
      - name: Package extension
        run: ./node_modules/.bin/vsce package --no-dependencies

      # Guard (#584): a vsix that omits a runtime dep crashes at activation
      # with "Cannot find module ...". Assert the packaged bundle inlines
      # cross-spawn and carries no unbundled runtime require of it, so a future
      # change that drops bundling (or adds an un-inlined dep) fails CI here.
      - name: Verify runtime deps are bundled into the vsix
        run: |
          set -euo pipefail
          vsix=$(ls envdrift-vscode-*.vsix | head -n1)
          rm -rf _vsix_check
          unzip -o -q "$vsix" -d _vsix_check
          bundle=_vsix_check/extension/dist/extension.js
          test -f "$bundle" || { echo "::error::vsix is missing the bundled extension ($bundle)"; exit 1; }
          grep -q 'node_modules/cross-spawn' "$bundle" || { echo "::error::cross-spawn is not bundled into the vsix"; exit 1; }
          if grep -Eq 'require\((["'"'"'])cross-spawn\1\)' "$bundle"; then
            echo "::error::vsix bundle has an unbundled runtime require of cross-spawn"; exit 1
          fi
          echo "OK: cross-spawn is inlined into the packaged vsix bundle"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: envdrift-vscode.vsix
          path: envdrift-vscode/*.vsix
          retention-days: 7
