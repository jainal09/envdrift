name: Publish

on:
  push:
    # Only bare-semver tags (vX.Y.Z). `v[0-9]*` excludes the component release
    # tags `vscode-v*` / `agent-v*` (they start with `vs` / `ag`), so a VS Code
    # or agent release never triggers the PyPI publish.
    tags: ["v[0-9]*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Test matrix (3.11–3.14)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: uv sync --all-extras --locked

      - name: Run tests
        run: uv run pytest

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    # Only ever publish from a bare-semver tag ref. A `workflow_dispatch` from a
    # branch (no tag) can re-run the test matrix but must never publish to PyPI.
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref_name, 'vscode-') && !startsWith(github.ref_name, 'agent-') }}
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Verify bare-semver release tag
        # Belt-and-suspenders over the job `if`: refuse to publish unless the ref
        # is a strict bare-semver tag vX.Y.Z (rejects v1, v1.2, v1.2.3-rc1, vfoo,
        # and any workflow_dispatch ref that isn't such a tag).
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Refusing to publish: '${GITHUB_REF_NAME}' is not a bare-semver tag (vX.Y.Z)."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0  # Fetch all history for hatch-vcs to determine version

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: uv sync --all-extras --locked

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish

      - name: Extract release notes
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          tag = os.environ.get("GITHUB_REF_NAME", "").strip()
          version = tag[1:] if tag.startswith("v") else tag
          changelog = Path("CHANGELOG.md")
          if not tag or not changelog.exists():
            print("Skipping release notes extraction.")
            raise SystemExit(0)

          text = changelog.read_text()
          pattern = re.compile(
            rf"^##\s+.*\bv?{re.escape(version)}\b.*$\n(?P<body>.*?)(?=^##\s+|\Z)",
            re.M | re.S,
          )
          match = pattern.search(text)
          if not match:
            print(f"No changelog section found for {version}.")
            raise SystemExit(0)

          body = match.group("body").strip()
          if not body:
            print(f"Changelog section for {version} is empty.")
            raise SystemExit(0)

          Path("release-notes.md").write_text(body + "\n")
          print("Wrote release-notes.md")
          PY

      - name: Create GitHub release (if missing)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists."
            exit 0
          fi

          if [ -f release-notes.md ]; then
            gh release create "$tag" --title "$tag" --notes-file release-notes.md
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi

      - name: Add PyPI link to release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          pypi_url="https://pypi.org/project/envdrift/${version}/"
          body="$(gh release view "$tag" --json body -q .body || true)"
          if [ -z "$body" ] || [ "$body" = "null" ]; then
            echo "No release body found; creating notes with PyPI link."
            printf "PyPI: %s\n" "$pypi_url" > release-body.md
            gh release edit "$tag" --notes-file release-body.md
            exit 0
          fi
          case "$body" in
            *"$pypi_url"*)
              echo "PyPI link already present."
              exit 0
              ;;
          esac
          printf "%s\n\nPyPI: %s\n" "$body" "$pypi_url" > release-body.md
          gh release edit "$tag" --notes-file release-body.md

      - name: Upload release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          shopt -s nullglob
          files=(dist/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No dist files to upload."
            exit 0
          fi
          gh release upload "$tag" "${files[@]}" --clobber
