name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Serialize runs so overlapping pushes to main can't race release PRs or tag
# pushes (#495). Queue rather than cancel so a release in flight completes.
concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # NOTE: agent-release.yml and vscode-release.yml are deliberately NOT called
  # from here. RELEASE_PLEASE_TOKEN is a PAT, so the agent-v* / vscode-v* tags
  # it pushes already fire those workflows' `push: tags` triggers on their own.
  # Calling them here as reusable workflows ran every release TWICE
  # concurrently, racing binaries and checksums.txt on the same GitHub release
  # (#495). Keep exactly one trigger path per tag — enforced by
  # tests/unit/test_release_workflows.py.
