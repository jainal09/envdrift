name: Release VS Code Extension

on:
  # The only release path: vscode-v* tags pushed by release-please's PAT (or
  # manually). release-please.yml must NOT also call this workflow — that ran
  # every release twice (#495).
  push:
    tags:
      - 'vscode-v*'
  # Reusable-workflow interface kept for ad-hoc reuse; unused by release-please.
  workflow_call:
    inputs:
      tag_name:
        description: 'Tag name from release-please'
        required: true
        type: string

permissions:
  contents: write

# One release pipeline per tag (#495): the release-please PAT tag push is the
# only trigger; this per-tag group is a backstop so a re-run or duplicate
# trigger queues instead of racing .vsix uploads / Marketplace publishes for
# the same tag. Queue (don't cancel) so an in-flight release isn't killed
# mid-upload. Fixed prefix, not `github.workflow`: a called workflow sees the
# *caller's* name there, which would put a workflow_call run for the same tag
# in a different group than a tag push.
concurrency:
  group: release-vscode-${{ inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: envdrift-vscode

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: envdrift-vscode/package-lock.json

      - name: Get version from tag
        id: version
        env:
          TAG_INPUT: ${{ inputs.tag_name }}
        run: |
          # Handle both tag push and workflow_call
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#vscode-v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      # Tests gate the release (#495): a failing or crashing suite must fail
      # the build. Mirrors vscode-ci.yml — headless unit suite first, then the
      # Electron integration suite under a virtual X server.
      - name: Run unit tests
        run: npm run test:unit

      - name: Run extension tests
        run: xvfb-run -a npm test

      # Use the lockfile-pinned @vscode/vsce from devDependencies (installed by
      # `npm ci` above) — never a bare `npx vsce`, which fetches the deprecated
      # `vsce` package from the registry at release time (#495).
      # `--no-dependencies`: the `vscode:prepublish` script bundles all runtime
      # deps (cross-spawn et al.) into dist/extension.js via esbuild, so the
      # vsix needs no node_modules — matches vscode-ci.yml packaging (#584).
      - name: Package extension
        run: ./node_modules/.bin/vsce package --no-dependencies --out envdrift-${{ steps.version.outputs.VERSION }}.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: envdrift-vscode-${{ steps.version.outputs.VERSION }}.vsix
          path: envdrift-vscode/envdrift-${{ steps.version.outputs.VERSION }}.vsix

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    outputs:
      tag: ${{ steps.version.outputs.TAG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Get version from tag
        id: version
        env:
          TAG_INPUT: ${{ inputs.tag_name }}
        run: |
          # Handle both tag push and workflow_call
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#vscode-v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: envdrift-vscode-${{ steps.version.outputs.VERSION }}.vsix
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: VS Code Extension v${{ steps.version.outputs.VERSION }}
          body: |
            ## EnvDrift VS Code Extension v${{ steps.version.outputs.VERSION }}

            ### Installation

            #### From VS Code Marketplace (Recommended)
            1. Open VS Code
            2. Go to Extensions (Ctrl+Shift+X)
            3. Search for "EnvDrift"
            4. Click Install

            #### Manual Installation
            1. Download `envdrift-${{ steps.version.outputs.VERSION }}.vsix` below
            2. In VS Code, open Command Palette (Ctrl+Shift+P)
            3. Run "Extensions: Install from VSIX..."
            4. Select the downloaded file

            ### Features
            - Auto-encryption of .env files on save
            - Status bar showing encryption status
            - Agent status indicator
            - Notifications for encryption events
            - Configurable settings

            ### Requirements
            - VS Code 1.85.0 or higher
            - `envdrift` installed via the [universal installer](https://github.com/jainal09/envdrift#installation)
          files: |
            release/*.vsix
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to Marketplace
    runs-on: ubuntu-latest
    needs: release
    # `secrets` is not available in a step `if:` (causes "Unrecognized named-value:
    # 'secrets'"), which breaks workflow validation when this file is used as a
    # reusable workflow. Expose the PAT as job-level env so the publish step can
    # gate on `env.VSCE_PAT` instead.
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    # Only publish stable releases to marketplace (no -rc, -beta, -alpha suffixes)
    # Use tag from release job instead of github.ref_name, which is 'main' in workflow_call runs
    if: ${{ !contains(needs.release.outputs.tag, '-rc') && !contains(needs.release.outputs.tag, '-beta') && !contains(needs.release.outputs.tag, '-alpha') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: envdrift-vscode/package-lock.json

      - name: Get version from tag
        id: version
        env:
          TAG_INPUT: ${{ inputs.tag_name }}
        run: |
          # Handle both tag push and workflow_call
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#vscode-v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # Install the lockfile-pinned @vscode/vsce so publishing uses the exact
      # packager CI validates — not whatever `npx` fetches at release time (#495).
      - name: Install dependencies
        run: npm ci

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: envdrift-vscode-${{ steps.version.outputs.VERSION }}.vsix
          path: release

      - name: Publish to VS Code Marketplace
        # Skip cleanly when the PAT is not configured, but do NOT swallow a real
        # publish failure (expired/insufficient PAT, network, etc.) — those must
        # fail the job so a silent non-publish is visible. Gate on env (job-level)
        # rather than secrets, which is not a valid context in a step `if:`.
        if: ${{ env.VSCE_PAT != '' }}
        run: ./node_modules/.bin/vsce publish --packagePath ../release/envdrift-${{ steps.version.outputs.VERSION }}.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
