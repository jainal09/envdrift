[vault]
provider = "azure"  # or aws/hashicorp/gcp

[vault.azure]
vault_url = "https://env-drift.vault.azure.net/"

[vault.sync]
default_vault_name = "my-keyvault"
env_keys_filename = ".env.keys"
max_workers = 4  # Optional: parallelize pull/lock env file operations

[[vault.sync.mappings]]
secret_name = "playground-key-prod"
folder_path = "."
environment = "prod"
