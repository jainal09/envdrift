# envdrift playground config

[guard]
scanners = ["native"]
auto_install = false
include_history = false
check_entropy = true
fail_on_severity = "high"
ignore_paths = []

[partial_encryption]
enabled = true

# Existing combine mode
[[partial_encryption.environments]]
name = "staging"
clear_file = ".env.staging.clear"
secret_file = ".env.staging.secret"
combined_file = ".env.staging.combined"

# Secrets-only mode: encrypt/decrypt the secrets dir in place, configs untouched
[[partial_encryption.environments]]
name = "production-secrets"
secrets_only = true
secrets_dir = "secrets/production/"
pattern = ".env*"

# Vault sync (single provider — see the Env File Sync guide)
[vault]
provider = "azure"  # or aws/hashicorp/gcp

[vault.azure]
vault_url = "https://env-drift.vault.azure.net/"

[vault.sync]
default_vault_name = "env-drift"  # matches the vault host in vault_url above
env_keys_filename = ".env.keys"
max_workers = 4  # Optional: parallelize pull/lock env file operations

[[vault.sync.mappings]]
secret_name = "playground-key-prod"
folder_path = "."
environment = "prod"
